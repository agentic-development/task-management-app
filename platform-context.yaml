---
name: "Task Management App"
type: platform-context
blueprint: task-management
---
language: typescript
framework: next.js
runtime: node
database:
  type: sqlite
  orm: prisma
auth:
  provider: next-auth
  strategy: session
design-system:
  framework: tailwind
  component-library: daisyui
hosting:
  provider: self-hosted
  runtime: docker
testing:
  unit: vitest
  e2e: playwright
conventions:
  api-style: rest
  state-management: server-components-react-query
  file-structure: feature-based
